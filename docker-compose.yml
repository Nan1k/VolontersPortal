# Запуск: docker compose up --build
# UI: http://localhost:3000  API: http://localhost:8000  docs: http://localhost:8000/docs
# URL API для сборки фронта (из браузера): задайте PUBLIC_API_URL перед сборкой, иначе localhost:8000
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-volonters}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-volonters}
      POSTGRES_DB: ${POSTGRES_DB:-volonters}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-volonters} -d ${POSTGRES_DB:-volonters}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-volonters}
      DB_USER: ${POSTGRES_USER:-volonters}
      DB_PASS: ${POSTGRES_PASSWORD:-volonters}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
